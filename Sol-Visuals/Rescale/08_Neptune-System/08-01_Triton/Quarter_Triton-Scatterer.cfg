@Scatterer_atmosphere:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Atmo[Triton]
    {
        @HR /= 4
        @HM /= 4
        @m_betaR = 0.037438,0.03725,0.038782
        @BETA_MSca = 0.04,0.04,0.04
        @ozoneHeight /= 2
        @ozoneFalloff /= 2
    }
}
