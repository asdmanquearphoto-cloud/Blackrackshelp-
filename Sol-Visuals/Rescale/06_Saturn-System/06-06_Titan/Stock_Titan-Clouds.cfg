@EVE_CLOUDS:HAS[@Sol_Configuration:HAS[#SystemScale[Quarter]]]:AFTER[SolSystem]
{
    @OBJECT[Titan-Cirrus]
    {
        @altitude /= 3
        @layerRaymarchedVolumeV5
        {
            @scaledFadeStartAltitude /= 3
            @scaledFadeEndAltitude /= 3
            @cloudTypes
            {
                @Item,*
                {
                    @baseNoiseTiling /= 3
                    @minAltitude /= 3
                    @maxAltitude /= 3
                }
            }
            @lightVolumeSettings
            {
                @maxLightVolumeRadius /= 3
            }
        }
    }
    @OBJECT[Titan-Cumulus]
    {
        @altitude /= 3
        @layerRaymarchedVolumeV5
        {
            @scaledFadeStartAltitude /= 3
            @scaledFadeEndAltitude /= 3
            @cloudTypes
            {
                @Item,*
                {
                    @baseNoiseTiling /= 3
                    @minAltitude /= 3
                    @maxAltitude /= 3
                }
            }
            @lightVolumeSettings
            {
                @maxLightVolumeRadius /= 3
            }
        }
    }
}