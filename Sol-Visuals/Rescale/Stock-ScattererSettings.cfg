@Scatterer_planetsList:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @scattererCelestialBodies
    {
        @Item:HAS[#celestialBodyName[Venus]]
        {
            @loadDistance /= 9
            @unloadDistance /= 9
        }
        @Item:HAS[#celestialBodyName[Earth]]
        {
            @loadDistance /= 9
            @unloadDistance /= 9
        }
        @Item:HAS[#celestialBodyName[Mars]]
        {
            @loadDistance /= 9
            @unloadDistance /= 9
        }
        @Item:HAS[#celestialBodyName[Jupiter]]
        {
            @loadDistance /= 9
            @unloadDistance /= 9
        }
        @Item:HAS[#celestialBodyName[Titan]]
        {
            @loadDistance /= 9
            @unloadDistance /= 9
        }
        @Item:HAS[#celestialBodyName[Triton]]
        {
            @loadDistance /= 9
            @unloadDistance /= 9
        }
        @Item:HAS[#celestialBodyName[Pluto]]
        {
            @loadDistance /= 9
            @unloadDistance /= 9
        }
    }
}
