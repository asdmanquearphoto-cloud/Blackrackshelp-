@EVE_CLOUDS:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @OBJECT[Earth-TropicalCumulus]
    {
        @altitude /= 3
        @layerRaymarchedVolumeV5
        {
            @scaledFadeStartAltitude /= 3
            @scaledFadeEndAltitude /= 3
            @raymarchingSettings
			{
				%lightMarchSteps = 4
				%lightMarchDistance = 1200
				%baseStepSize = 75
				%adaptiveStepSizeFactor = 0.003
				%maxStepSize = 1500
			}
            @cloudTypes
            {
                @Item,*
                {
                    @baseNoiseTiling /= 3
                    @minAltitude /= 3
                    @maxAltitude /= 3
                }
            }
        }
    }
    @OBJECT[Earth-TemperateCumulus]
    {
        @altitude /= 3
        @layerRaymarchedVolumeV5
        {
            @scaledFadeStartAltitude /= 3
            @scaledFadeEndAltitude /= 3
            @raymarchingSettings
			{
				%lightMarchSteps = 4
				%lightMarchDistance = 1200
				%baseStepSize = 75
				%adaptiveStepSizeFactor = 0.003
				%maxStepSize = 1500
			}
            @cloudTypes
            {
                @Item,*
                {
                    @baseNoiseTiling /= 3
                    @minAltitude /= 3
                    @maxAltitude /= 3
                }
            }
        }
    }
    @OBJECT[Earth-Cirrus]
    {
        @altitude /= 3
        @layerRaymarchedVolumeV5
        {
            @scaledFadeStartAltitude /= 3
            @scaledFadeEndAltitude /= 3
            @raymarchingSettings
			{
				%lightMarchSteps = 3
				%lightMarchDistance = 1200
				%baseStepSize = 75
				%adaptiveStepSizeFactor = 0.001
				%maxStepSize = 1500
			}
            @cloudTypes
            {
                @Item,*
                {
                    @minAltitude /= 3
                    @maxAltitude /= 3
                }
            }
        }
    }
}