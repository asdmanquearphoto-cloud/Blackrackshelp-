@EVE_CLOUDS:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @OBJECT[Venus-Lower]
    {
        @altitude /= 3
        @layerRaymarchedVolumeV5
        {
            @scaledFadeStartAltitude /= 3
            @scaledFadeEndAltitude /= 3
            @cloudTypes
            {
                @Item,*
                {
                    @baseNoiseTiling /= 3
                    @minAltitude /= 3
                    @maxAltitude /= 3
                }
            }
        }
    }
    @OBJECT[Venus-Mid]
    {
        @altitude /= 3
        @layerRaymarchedVolumeV5
        {
            @scaledFadeStartAltitude /= 3
            @scaledFadeEndAltitude /= 3
            @cloudTypes
            {
                @Item,*
                {
                    @baseNoiseTiling /= 3
                    @minAltitude /= 3
                    @maxAltitude /= 3
                }
            }
        }
    }
    @OBJECT[Venus-Upper]
    {
        @altitude /= 3
        @layerRaymarchedVolumeV5
        {
            @scaledFadeStartAltitude /= 3
            @scaledFadeEndAltitude /= 3
            @cloudTypes
            {
                @Item,*
                {
                    @baseNoiseTiling /= 3
                    @minAltitude /= 3
                    @maxAltitude /= 3
                }
            }
        }
    }
}